<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image → SVG → Android Vector</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <div class="brand">
            <span class="material-symbols-rounded logo-icon">deployed_code</span>
            <h1>Image → SVG → Android Vector</h1>
        </div>
        <p>Convert PNG, JPG &amp; WebP into Android VectorDrawable XML</p>
    </header>

    <section class="controls">

        <div class="top-bar">

            <div id="dropZone" class="drop-zone">
                <input type="file" id="imageFile" accept="image/*">
                <span id="dropZoneText">Drag & drop, paste, &amp; or upload an image here</span>
                
            </div>

            <div class="settings">

                <div class="setting">
                    <label>Colors</label>
                    <input type="range" id="colors" min="2" max="128" value="32">
                    <span id="colorsValue">32</span>
                </div>

                <div class="setting">
                    <label>Detail</label>
                    <select id="detail">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>

            </div>

            <button id="traceBtn">
                <span class="material-symbols-rounded">sync_alt</span>
                Image → XML
            </button>

        </div>

        <div id="progressWrap" class="progress-wrap">
            <div class="progress-track">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <span id="progressText" class="progress-text">0%</span>
        </div>

        <!-- Preview Section -->
        <div class="viewer-grid">

            <div class="viewer">
                <h3>🖼 Original Image</h3>
                <img id="imagePreview" alt="Preview">
            </div>

            <div class="viewer">
                <h3>🎨 SVG Preview</h3>
                <div id="svgPreview"></div>
            </div>

        </div>

        <!-- Output Section -->
        <div class="output-grid">

            <!-- SVG Code -->
            <div class="panel">
                <h3>📄 SVG Code</h3>

                <textarea id="svgOutput" placeholder="Paste your generated SVG or your own SVG here..."></textarea>

                <div class="buttons">
                    <button id="copySvgBtn">
                        <span class="material-symbols-rounded">content_copy</span>
                        Copy
                    </button>

                    <button id="downloadSvgBtn">
                        <span class="material-symbols-rounded">download</span>
                        SVG
                    </button>

                    <button id="downloadPreviewBtn">
                        <span class="material-symbols-rounded">image</span>
                        Download
                    </button>

                    <button id="convertXmlBtn">
                        <span class="material-symbols-rounded">sync_alt</span>
                        XML
                    </button>
                </div>
            </div>

            <!-- Android XML -->
            <div class="panel">
                <h3>🤖 Android XML</h3>

                <textarea id="xmlOutput" placeholder="Paste the generated XML or Android Vector XML here..."></textarea>

                <div class="buttons">
                    <button id="copyXmlBtn">
                        <span class="material-symbols-rounded">content_copy</span>
                        Copy
                    </button>

                    <button id="downloadBtn">
                        <span class="material-symbols-rounded">download</span>
                        XML
                    </button>

                    <button id="convertSvgBtn">
                        <span class="material-symbols-rounded">sync_alt</span>
                        SVG
                    </button>
                </div>
            </div>

        </div>

    </section>

</div>

<script src="imagetracer_v1.2.6.js"></script>
<script src="script.js"></script>

</body>
</html>
